<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="800" viewBox="0 0 1920 800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0D9488" stop-opacity="0.10"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="800" fill="url(#bg)"/>
  <!-- Circuit-like pattern -->
  <g stroke="#7C3AED" stroke-opacity="0.08" stroke-width="1.5" fill="none">
    <path d="M100,200 L250,200 L250,350 L400,350"/>
    <circle cx="100" cy="200" r="4" fill="#7C3AED" fill-opacity="0.12"/>
    <circle cx="250" cy="200" r="4" fill="#7C3AED" fill-opacity="0.12"/>
    <circle cx="250" cy="350" r="4" fill="#7C3AED" fill-opacity="0.12"/>
    <circle cx="400" cy="350" r="4" fill="#7C3AED" fill-opacity="0.12"/>
  </g>
  <g stroke="#0D9488" stroke-opacity="0.08" stroke-width="1.5" fill="none" transform="translate(1300, 300)">
    <path d="M100,200 L250,200 L250,100 L400,100"/>
    <circle cx="100" cy="200" r="4" fill="#0D9488" fill-opacity="0.12"/>
    <circle cx="250" cy="200" r="4" fill="#0D9488" fill-opacity="0.12"/>
    <circle cx="250" cy="100" r="4" fill="#0D9488" fill-opacity="0.12"/>
    <circle cx="400" cy="100" r="4" fill="#0D9488" fill-opacity="0.12"/>
  </g>
  <!-- Floating squares -->
  <g fill="none" stroke="#7C3AED" stroke-opacity="0.05" stroke-width="1">
    <rect x="800" y="100" width="40" height="40" rx="4"/>
    <rect x="900" y="150" width="30" height="30" rx="3"/>
    <rect x="1050" y="80" width="50" height="50" rx="5"/>
  </g>
  <g fill="none" stroke="#0D9488" stroke-opacity="0.05" stroke-width="1">
    <rect x="700" y="600" width="45" height="45" rx="4"/>
    <rect x="850" y="650" width="35" height="35" rx="3"/>
    <rect x="1000" cy="580" width="55" height="55" rx="5"/>
  </g>
</svg>
