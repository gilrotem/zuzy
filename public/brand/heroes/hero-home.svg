<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="800" viewBox="0 0 1920 800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#0D9488" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0.12"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0D9488" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="800" fill="url(#bg)"/>
  <!-- Geometric pattern -->
  <circle cx="200" cy="150" r="120" fill="none" stroke="#7C3AED" stroke-opacity="0.08" stroke-width="2"/>
  <circle cx="200" cy="150" r="80" fill="none" stroke="#7C3AED" stroke-opacity="0.06" stroke-width="1.5"/>
  <circle cx="1720" cy="650" r="150" fill="none" stroke="#0D9488" stroke-opacity="0.08" stroke-width="2"/>
  <circle cx="1720" cy="650" r="100" fill="none" stroke="#0D9488" stroke-opacity="0.06" stroke-width="1.5"/>
  <circle cx="960" cy="400" r="250" fill="none" stroke="#7C3AED" stroke-opacity="0.04" stroke-width="1"/>
  <circle cx="960" cy="400" r="200" fill="none" stroke="#0D9488" stroke-opacity="0.04" stroke-width="1"/>
  <!-- Decorative lines -->
  <line x1="0" y1="600" x2="600" y2="300" stroke="url(#accent)" stroke-width="1" stroke-opacity="0.15"/>
  <line x1="1920" y1="200" x2="1320" y2="500" stroke="url(#accent)" stroke-width="1" stroke-opacity="0.15"/>
  <!-- Dots grid -->
  <g fill="#7C3AED" fill-opacity="0.06">
    <circle cx="400" cy="100" r="3"/><circle cx="450" cy="100" r="3"/><circle cx="500" cy="100" r="3"/>
    <circle cx="400" cy="150" r="3"/><circle cx="450" cy="150" r="3"/><circle cx="500" cy="150" r="3"/>
    <circle cx="400" cy="200" r="3"/><circle cx="450" cy="200" r="3"/><circle cx="500" cy="200" r="3"/>
  </g>
  <g fill="#0D9488" fill-opacity="0.06">
    <circle cx="1400" cy="550" r="3"/><circle cx="1450" cy="550" r="3"/><circle cx="1500" cy="550" r="3"/>
    <circle cx="1400" cy="600" r="3"/><circle cx="1450" cy="600" r="3"/><circle cx="1500" cy="600" r="3"/>
    <circle cx="1400" cy="650" r="3"/><circle cx="1450" cy="650" r="3"/><circle cx="1500" cy="650" r="3"/>
  </g>
</svg>
